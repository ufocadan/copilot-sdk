models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Call the get_big_string tool and reply with the word DONE only.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: get_big_string
              arguments: "{}"
      - role: tool
        tool_call_id: toolcall_0
        content: |-
          Output too large to read at once (97.7 KB). Saved to: /session-state/temp/PLACEHOLDER-copilot-tool-output-PLACEHOLDER
          Consider using tools like grep (for searching), head/tail (for viewing start/end), view with view_range (for specific sections), or jq (for JSON) to examine portions of the output.

          Preview (first 500 chars):
          
      - role: assistant
        content: DONE

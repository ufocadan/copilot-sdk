models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Read the contents of test.txt and tell me what it says
      - role: assistant
        content: I'll read the test.txt file for you.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Reading test.txt file"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/test.txt"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Read the contents of test.txt and tell me what it says
      - role: assistant
        content: I'll read the test.txt file for you.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Reading test.txt file"}'
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/test.txt"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: 1. Hello transform!
      - role: assistant
        content: |-
          The file test.txt contains:
          ```
          Hello transform!
          ```
